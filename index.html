<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Vision | No-Token Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #ff0055; --s: #00d2ff; --bg: #050505; }
        body { background: #0a0a12; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #111; border: 2px solid var(--p); border-radius: 20px; padding: 30px; width: 420px; text-align: center; box-shadow: 0 0 30px rgba(255, 0, 85, 0.2); }
        
        textarea { 
            width: 100%; height: 90px; background: #000; border: 1px solid #333; 
            border-radius: 12px; color: white; padding: 12px; margin-bottom: 20px; 
            resize: none; outline: none; box-sizing: border-box; font-size: 0.9rem;
        }

        .btn { 
            width: 100%; padding: 15px; border-radius: 10px; border: none; 
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; 
            transition: 0.3s; font-size: 0.8rem;
        }
        .btn-gen { background: var(--p); color: white; margin-bottom: 15px; }
        .btn-save { background: var(--s); color: black; display: none; }

        #result-box { 
            margin-top: 20px; min-height: 250px; border: 1px dashed #444; 
            border-radius: 15px; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; background: #000;
        }
        img { max-width: 100%; border-radius: 10px; display: none; }
        
        .loader { 
            display: none; border: 4px solid #222; border-top: 4px solid var(--s); 
            border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .back { margin-top: 25px; color: #444; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1 style="font-family: 'Orbitron'; color: var(--s); font-size: 1.3rem; margin-bottom: 20px;">AI IMAGE STUDIO</h1>
        
        <textarea id="promptInput" placeholder="Hayalini İngilizce yaz... (Örn: Cyberpunk cat in neon city)"></textarea>
        
        <button class="btn btn-gen" id="genBtn" onclick="generateImage()">HAYALİNİ ÇİZ</button>

        <div id="result-box">
            <div class="loader" id="loader"></div>
            <img id="outputImg" alt="Yapay Zeka Görseli">
        </div>

        <button id="saveBtn" class="btn btn-save" onclick="downloadImage()">RESMİ BİLGİSAYARA KAYDET</button>
    </div>

    <a href="../index.html" class="back">← LOBİYE DÖN</a>

    <script>
        function generateImage() {
            const prompt = document.getElementById('promptInput').value.trim();
            const genBtn = document.getElementById('genBtn');
            const loader = document.getElementById('loader');
            const outputImg = document.getElementById('outputImg');
            const saveBtn = document.getElementById('saveBtn');

            if (!prompt) {
                alert("Lütfen bir hayal kur ve yaz Ozan!");
                return;
            }

            // Durumu güncelle
            genBtn.disabled = true;
            genBtn.innerText = "YAPAY ZEKA ÇİZİYOR...";
            loader.style.display = "block";
            outputImg.style.display = "none";
            saveBtn.style.display = "none";

            // Pollinations AI URL - Token istemez, doğrudan link üzerinden çalışır
            // Ekstra detaylar ekleyerek kaliteyi artırıyoruz
            const finalPrompt = encodeURIComponent(prompt + " high quality, 4k, neon aesthetic");
            const imageUrl = `https://image.pollinations.ai/prompt/${finalPrompt}?width=512&height=512&nologo=true`;

            // Resmi önbelleğe alıp yüklenmesini bekleyelim
            const tempImg = new Image();
            tempImg.src = imageUrl;

            tempImg.onload = function() {
                outputImg.src = imageUrl;
                outputImg.style.display = "block";
                saveBtn.style.display = "block";
                loader.style.display = "none";
                genBtn.disabled = false;
                genBtn.innerText = "HAYALİNİ ÇİZ";
            };

            tempImg.onerror = function() {
                alert("Görsel oluşturulurken bir hata oluştu. Tekrar dene.");
                loader.style.display = "none";
                genBtn.disabled = false;
                genBtn.innerText = "TEKRAR DENE";
            };
        }

        async function downloadImage() {
            const img = document.getElementById('outputImg');
            try {
                const response = await fetch(img.src);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = 'ozan-ai-art.png';
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
            } catch (error) {
                // Eğer blob hatası verirse doğrudan linki yeni sekmede aç
                window.open(img.src, '_blank');
            }
        }
    </script>
</body>
</html>
